name: Build John APK

# Triggers:
#   - every push to main (keeps the APK fresh with the latest source)
#   - manual trigger from the Actions tab (for on-demand rebuilds)
#   - tags matching v* (so a git tag like v1.2.3 also produces an APK)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Only one concurrent build at a time per branch (avoids wasted CI minutes).
concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17 (for Gradle + Android)
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: 34.0.0
          # Capacitor 6 + AGP 8 require JDK 17 (we set it above) and Android Gradle Plugin 8.x

      - name: Install JS dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web app (Vite → dist/)
        run: npm run build

      - name: Capacitor sync (copies dist/ into android/app/src/main/assets/public)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          file android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: john-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90

      - name: Attach APK to GitHub Release (only on tag pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
